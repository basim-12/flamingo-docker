version: '3.8'

services:
  app:
    build: .
    volumes:
      # 1. Mount the data folder from the backend repo
      - ../flamingo-node/data:/data

      # 2. Mount the actual source code from the backend repo into the container
      - ../flamingo-node:/app

      # 3. Inject the Docker environment file (which now lives in this docker repo) into the app
      - ./env.docker.json:/app/env.docker.json

      # 4. Prevent the local Mac node_modules from breaking the container's Linux node_modules
      - /app/node_modules

    ports:
      - "9966:9966" # Web UI
      - "8080:8080" # WebSocket API
    environment:
      - ENV_FILE=/app/env.docker.json
    command: >
      bash -c "npm install && npm run cli start & npm run start"
