services:
  app:
    build: .
    volumes:
      - ../flamingo-node/data:/data
      - ../flamingo-node:/app
      - /app/node_modules
      - ../flamingo-ui:/ui
      - /ui/node_modules
      # Mount the env file to a separate /config directory
      - ./env.docker.json:/config/env.docker.json
    ports:
      - "9966:9966"
      - "8080:8080"
    environment:
      - ENV_FILE=/config/env.docker.json
      - UI_MODE=${UI_MODE:-start-legacy}
    command: >
      bash -c "cd /app && npm install && npm run cli start &
               cd /ui && npm install && npm run $${UI_MODE} &
               wait"
